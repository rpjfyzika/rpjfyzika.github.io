<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Témy - Fyzika</title>
    <style>
        body {
            background-color: #fcfcfc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .grid-temy {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        /* Odkaz roztiahnutý na celú plochu karty */
        .tema-karta {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 10px;
            height: 120px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .tema-karta:hover {
            border-color: #3498db;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Štýlovanie samotného odkazu vo vnútri karty */
        .tema-karta a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-decoration: none; /* Odstráni podčiarknutie */
            color: #555;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Farebný detail navrchu */
        .tema-karta::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: #3498db;
            border-radius: 0 0 5px 5px;
        }
    </style>
</head>
<body>

        </div>

        <div class="tema-karta">

        <div class="tema-karta">

        <div class="tema-karta">

        </div>

    </div>

</body>
</html>
